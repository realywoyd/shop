<!doctype html><html lang="ru"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Калькулятор футболок</title><style>
:root{--bg:#f8f1f3;--surface:#fff;--text:#171717;--muted:#5e5e5e;--line:#d6e6da;--line-strong:#8fb89a;--accent:#3d8b57;--accent-dark:#2f6f45;--accent-soft:#eaf5ed;--shadow:0 10px 30px rgba(57,96,69,.10)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:40px 16px}
.wrap{max-width:1080px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.wrap:before{content:'';position:absolute;left:0;top:0;width:340px;height:340px;background:radial-gradient(circle,rgba(61,139,87,.11),transparent 68%)}
.head{padding:42px 38px 20px;text-align:center;position:relative;z-index:1}h1{margin:0;font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);gap:22px;padding:12px 22px 22px;position:relative;z-index:1}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:22px;min-width:0}.panel{background:linear-gradient(180deg,#fcfffd,#f7fbf8)}
.step+.step{margin-top:18px}.step.is-hidden{display:none}.step h3,.card h3{margin:0 0 12px;font-size:18px;font-weight:800}
.seg,.dim-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.select{width:100%;min-height:54px;padding:10px 12px;border:1.5px solid var(--line);border-radius:14px;background:#fff;font-size:15px;font-weight:700;color:#333;outline:none}
.select:focus{border-color:var(--accent)}
.btn{border:1.5px solid var(--line);background:#fff;border-radius:14px;min-height:54px;padding:10px 12px;cursor:pointer;transition:.18s ease;font-size:15px;font-weight:700;color:#333}
.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);background:#fbfefc}.btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.btn:disabled,.sw:disabled,.mini-btn:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none;background:#fafafa}
.swatches{display:grid;grid-template-columns:repeat(auto-fit,52px);gap:12px}
.sw{width:52px;height:52px;border-radius:50%;border:2px solid #d7d7d7;cursor:pointer;background:var(--sw);transition:.18s ease}
.sw.white{box-shadow:inset 0 0 0 1px #d8d8d8}.sw.transparent{background:linear-gradient(45deg,#efefef 25%,#fff 25%,#fff 50%,#efefef 50%,#efefef 75%,#fff 75%,#fff 100%);background-size:12px 12px}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,139,87,.14)}
.place-list{display:grid;gap:12px}.place-card{border:1px solid #dfece2;border-radius:18px;padding:14px;background:#fff}.place-card.is-on{background:#f9fdf9;border-color:#cce2d3}
.place-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.place-name{font-size:16px;font-weight:800}
.toggle{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:800;cursor:pointer}.toggle.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.colors-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.color-buttons{display:grid;grid-template-columns:repeat(7,minmax(40px,1fr));gap:8px}.mini-btn{border:1.5px solid var(--line);background:#fff;border-radius:12px;min-height:42px;padding:6px 8px;cursor:pointer;font-size:13px;font-weight:800}
.mini-btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.sum{display:grid;gap:14px;min-width:0}.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}.badge{border:1px solid #dfece2;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:#36523f;background:#fff}
.row{display:flex;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px dashed #e9efe9;font-size:15px;color:#444}.row:last-child{border-bottom:none;padding-bottom:0}.row strong{color:#191919}
.formula{font-size:14px;color:var(--muted);line-height:1.55;margin-top:8px}.totalcard{background:linear-gradient(180deg,#f8fcf9,#eef7f1);border-color:#d8ebde}.total{font-size:40px;font-weight:900;color:var(--accent-dark);line-height:1;margin-top:6px}
@media (max-width:980px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
@media (max-width:560px){body{padding:10px 8px}.wrap{border-radius:22px}.head{padding:18px 14px 10px}h1{font-size:24px}.grid{padding:10px;gap:10px}.panel,.card{padding:14px;border-radius:18px}.seg,.dim-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.btn{min-height:46px;padding:8px;font-size:13px;border-radius:12px}.swatches{grid-template-columns:repeat(4,52px);gap:10px}.sw{width:48px;height:48px}.place-top{align-items:flex-start;flex-direction:column}.colors-row{grid-template-columns:1fr}.color-buttons{grid-template-columns:repeat(4,minmax(38px,1fr))}.badge{font-size:12px;padding:7px 10px}.row,.formula{font-size:12px}.total{font-size:28px}}
</style></head><body><section class="wrap"><div class="head"><h1>Калькулятор расчёта стоимости печати на  футболках</h1></div><div class="grid" id="app"></div></section><script>
const APP={genders:[{id:'male',label:'Мужское'},{id:'female',label:'Женское'}],materials:[{id:'cotton100',label:'100% хлопок',densities:[145,155,180,240,300]},{id:'kulirka_lycra',label:'Кулирка с лайкрой 92/8',densities:[165,200,240]}],colors:['Белый','Чёрный','Серый','Бежевый','Красный','Синий','Голубой','Зелёный','Жёлтый','Розовый','Фиолетовый','Оранжевый','Бордовый','По запросу'],quantities:[50,100,200,300,500,1000],printColors:[1,2,3,4,5,6,7],places:[{id:'chest',label:'Грудь'},{id:'back',label:'Спина'},{id:'leftSleeve',label:'Левый рукав'},{id:'rightSleeve',label:'Правый рукав'}],models:[{id:'standard',label:'Стандартная',basePrice:650},{id:'oversize',label:'Оверсайз',basePrice:850}],printPriceByPlace:{chest:{1:90,2:130,3:170,4:210,5:250,6:290,7:330},back:{1:120,2:170,3:220,4:270,5:320,6:370,7:420},leftSleeve:{1:60,2:90,3:120,4:150,5:180,6:210,7:240},rightSleeve:{1:60,2:90,3:120,4:150,5:180,6:210,7:240}}};
const money=v=>new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(v)+' руб.'; const n0=v=>new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(v);
class Calc {
  constructor(root){this.root=root;this.s={gender:'',model:'',material:'',density:null,color:'',qty:null,chestEnabled:true,chestColors:2,backEnabled:false,backColors:1,leftSleeveEnabled:false,leftSleeveColors:1,rightSleeveEnabled:false,rightSleeveColors:1};this.render();}
  btn(label,active,a,v){return `<button type="button" class="btn ${active?'active':''}" data-a="${a}" data-v="${v}">${label}</button>`;}
  placeCard(place){const s=this.s,enabled=!!s[place.id+'Enabled'],colors=s[place.id+'Colors'];return `<div class="place-card ${enabled?'is-on':''}"><div class="place-top"><div class="place-name">${place.label}</div><button type="button" class="toggle ${enabled?'on':''}" data-a="toggle" data-place="${place.id}" data-v="${enabled?'off':'on'}">${enabled?'Включено':'Не выбрано'}</button></div><div class="colors-row"><div>Количество цветов печати</div><div class="color-buttons">${APP.printColors.map(num=>`<button type="button" class="mini-btn ${num===colors?'active':''}" data-a="placeColors" data-place="${place.id}" data-v="${num}" ${enabled?'':'disabled'}>${num}</button>`).join('')}</div></div></div>`;}
  render(){
    const s=this.s,materialObj=APP.materials.find(x=>x.id===s.material),densities=materialObj?materialObj.densities:[],modelObj=APP.models.find(x=>x.id===s.model),base=modelObj?modelObj.basePrice:0,price=id=>s[id+'Enabled']?(APP.printPriceByPlace[id][s[id+'Colors']]||0):0,chest=price('chest'),back=price('back'),leftSleeve=price('leftSleeve'),rightSleeve=price('rightSleeve'),unit=base+chest+back+leftSleeve+rightSleeve,total=unit*(s.qty||0);
    this.root.innerHTML=`<div class="panel"><div class="step"><h3>Выберите пол</h3><div class="seg">${APP.genders.map(i=>this.btn(i.label,s.gender===i.id,'gender',i.id)).join('')}</div></div><div class="step ${s.gender?'':'is-hidden'}"><h3>Модель</h3><div class="seg">${APP.models.map(i=>this.btn(i.label,s.model===i.id,'model',i.id)).join('')}</div></div><div class="step ${(s.gender&&s.model)?'':'is-hidden'}"><h3>Материал</h3><div class="seg">${APP.materials.map(i=>this.btn(i.label,s.material===i.id,'material',i.id)).join('')}</div></div><div class="step ${(s.gender&&s.model&&s.material)?'':'is-hidden'}"><h3>Плотность</h3><div class="dim-grid">${densities.map(i=>this.btn(i+' г/м²',s.density===i,'density',i)).join('')}</div></div><div class="step ${(s.gender&&s.model&&s.material&&s.density)?'':'is-hidden'}"><h3>Тираж</h3><div class="seg">${APP.quantities.map(i=>this.btn(i+' шт.',s.qty===i,'qty',i)).join('')}</div></div><div class="step ${(s.gender&&s.model&&s.material&&s.density&&s.qty)?'':'is-hidden'}"><h3>Места нанесения</h3><div class="place-list">${APP.places.map(p=>this.placeCard(p)).join('')}</div></div></div><div class="sum"><div class="card"><div class="badges">${s.gender?`<div class="badge">${s.gender==='male'?'М':'Ж'}</div>`:''}${modelObj?`<div class="badge">${modelObj.label}</div>`:''}${materialObj?`<div class="badge">${materialObj.label}</div>`:''}${s.density?`<div class="badge">${s.density} г/м²</div>`:''}${s.color?`<div class="badge">${s.color}</div>`:''}${s.qty?`<div class="badge">${n0(s.qty)} шт.</div>`:''}${s.chestEnabled&&s.qty?`<div class="badge">Грудь: ${s.chestColors} цв.</div>`:''}${s.backEnabled&&s.qty?`<div class="badge">Спина: ${s.backColors} цв.</div>`:''}${s.leftSleeveEnabled&&s.qty?`<div class="badge">Левый рукав: ${s.leftSleeveColors} цв.</div>`:''}${s.rightSleeveEnabled&&s.qty?`<div class="badge">Правый рукав: ${s.rightSleeveColors} цв.</div>`:''}</div></div><div class="card"><h3>Расчёт стоимости</h3><div class="row"><span>База изделия</span><strong>${money(base)}</strong></div><div class="row"><span>Печать на груди</span><strong>${money(chest)}</strong></div><div class="row"><span>Печать на спине</span><strong>${money(back)}</strong></div><div class="row"><span>Печать на левом рукаве</span><strong>${money(leftSleeve)}</strong></div><div class="row"><span>Печать на правом рукаве</span><strong>${money(rightSleeve)}</strong></div><div class="formula">${money(unit)} × ${s.qty?n0(s.qty):0} шт.</div></div><div class="card totalcard"><h3>Итоговая стоимость</h3><div class="total">${money(total)}</div></div></div>`;
    this.root.querySelectorAll('[data-a]').forEach(el=>el.addEventListener('click',()=>{const a=el.dataset.a;let v=el.dataset.v;if(['density','qty','placeColors'].includes(a))v=Number(v);if(a==='gender'){s.gender=v;s.model='';s.material='';s.density=null;s.qty=null;}if(a==='model'){s.model=v;s.material='';s.density=null;s.qty=null;}if(a==='material'){s.material=v;s.density=null;s.color='';s.qty=null;}if(a==='density'){s.density=v;s.color='';s.qty=null;}if(a==='color'){s.color=v;s.qty=null;}if(a==='qty')s.qty=v;if(a==='toggle'){const p=el.dataset.place;s[p+'Enabled']=v==='on';}if(a==='placeColors'){const p=el.dataset.place;s[p+'Colors']=v;}this.render();}));
  }
}
new Calc(document.getElementById('app'));
</script></body></html>
