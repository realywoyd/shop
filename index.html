<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Package calculator sitefit fixed</title>
<style>
:root{--bg:#f8f1f3;--surface:#fff;--text:#171717;--muted:#5e5e5e;--line:#d6e6da;--line-strong:#8fb89a;--accent:#3d8b57;--accent-dark:#2f6f45;--accent-soft:#eaf5ed;--shadow:0 10px 30px rgba(57,96,69,.10)}
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:40px 16px}
.wrap{max-width:980px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.wrap:before{content:'';position:absolute;left:0;top:0;width:340px;height:340px;background:radial-gradient(circle,rgba(61,139,87,.11),transparent 68%)}
.head{padding:42px 38px 20px;text-align:center;position:relative;z-index:1}
.kicker{display:inline-block;background:var(--accent-soft);border:1px solid #d7ebdd;color:var(--accent);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;margin-bottom:14px}
h1{margin:0 0 10px;font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:22px;padding:22px;position:relative;z-index:1}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:22px}
.panel{background:linear-gradient(180deg,#fcfffd,#f7fbf8)}
.group+.group{margin-top:18px;padding-top:18px;border-top:1px solid #edf3ee}
.group h3,.card h3{margin:0 0 12px;font-size:18px;font-weight:800}
.hint{margin:0 0 12px;color:var(--muted);font-size:14px;line-height:1.5;min-height:20px}
.seg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.btn{border:1.5px solid var(--line);background:#fff;border-radius:14px;min-height:54px;padding:10px 12px;cursor:pointer;transition:.18s ease;font-size:15px;font-weight:700;color:#333}
.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);background:#fbfefc}
.btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;background:#fafafa}
.swatches{display:grid;grid-template-columns:repeat(auto-fit,52px);gap:12px}
.sw{width:52px;height:52px;border-radius:50%;border:2px solid #d7d7d7;cursor:pointer;background:var(--sw);transition:.18s ease}
.sw.white{box-shadow:inset 0 0 0 1px #d8d8d8}
.sw.transparent{background:linear-gradient(45deg,#efefef 25%,#fff 25%,#fff 50%,#efefef 50%,#efefef 75%,#fff 75%,#fff 100%);background-size:12px 12px}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,139,87,.14)}
.sw:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.sum{display:grid;gap:14px}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.badge{border:1px solid #dfece2;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:#36523f;background:#fff}
.row{display:flex;justify-content:space-between;gap:14px;padding-bottom:8px;border-bottom:1px dashed #e9efe9;font-size:15px;color:#444}
.row:last-child{border-bottom:none;padding-bottom:0}
.row strong{color:#191919}
.formula{font-size:14px;color:var(--muted);line-height:1.55;margin-top:8px}
.totalcard{background:linear-gradient(180deg,#f8fcf9,#eef7f1);border-color:#d8ebde}
.total{font-size:40px;font-weight:900;color:var(--accent-dark);line-height:1;margin-top:6px}
.muted{font-size:13px;color:var(--muted);line-height:1.55}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
.cta{border:none;border-radius:999px;padding:14px 20px;font-size:15px;font-weight:800;cursor:pointer}
.primary{background:var(--accent);color:#fff}
.secondary{background:#fff;color:var(--accent-dark);border:1px solid #dbeadf}
.foot{padding:0 24px 24px;text-align:center;color:var(--muted);font-size:13px}
@media (max-width:920px){.grid{grid-template-columns:1fr}h1{font-size:34px}}

@media (max-width:820px){
  .seg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .swatches{grid-template-columns:repeat(5,52px);justify-content:start}
}
@media (max-width:560px){
  body{padding:10px 8px}
  .wrap{border-radius:22px}
  .head{padding:18px 14px 10px}
  .kicker{font-size:11px;padding:7px 12px;margin-bottom:10px}
  h1{font-size:24px}
  .grid{padding:10px;gap:10px}
  .panel,.card{padding:14px;border-radius:18px}
  .group+.group{margin-top:14px;padding-top:14px}
  .group h3,.card h3{font-size:16px;margin-bottom:10px}
  .seg{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .btn{min-height:46px;padding:8px 8px;font-size:13px;border-radius:12px}
  .swatches{grid-template-columns:repeat(4,52px);gap:10px}
  .sw{width:48px;height:48px}
  .badges{gap:8px}
  .badge{font-size:12px;padding:7px 10px}
  .row{font-size:14px}
  .formula,.muted{font-size:12px}
  .total{font-size:28px}
  .actions{gap:8px}
  .cta{width:100%;padding:13px 16px;font-size:14px}
}

</style>
</head>
<body>
<section class="wrap">
  <div class="head">
    <h1>Калькулятор стоимости пакетов</h1>
  </div>
  <div class="grid" id="packageCalculator"></div>
</section>
<script>
const CFG = {
  sizes: [
    {id:'s225340v', label:'225 × 340'},
    {id:'s300400_30', label:'300 × 400'},
    {id:'s360450_30', label:'360 × 450'},
    {id:'s380500_30', label:'380 × 500'},
    {id:'s450500_30', label:'450 × 500'},
    {id:'s600500_30', label:'600 × 500'},
    {id:'s700500_30', label:'700 × 500'},
    {id:'s300400_40', label:'300 × 400'},
    {id:'s360450_40', label:'360 × 450'},
    {id:'s390500_40', label:'390 × 500'},
  ],
  colors: [
    {id:'white', label:'Белый', hex:'#ffffff', extra:'Белый'},
    {id:'transparent', label:'Прозрачный', hex:'transparent', extra:'Прозрачный', transparent:true},
    {id:'black', label:'Чёрный', hex:'#000000', extra:'Чёрный'},
    {id:'darkblue', label:'Т-синий', hex:'#0016b8', extra:'Т-синий'},
    {id:'lightblue', label:'Св.синий', hex:'#2020ff', extra:'Св.синий'},
    {id:'blue', label:'Голубой', hex:'#4e7dff', extra:'Голубой'},
    {id:'green', label:'Зелёный', hex:'#009b00', extra:'Зелёный'},
    {id:'beige', label:'Бежевый', hex:'#f4d36c', extra:'Бежевый'},
    {id:'red', label:'Красный', hex:'#ff1a0f', extra:'Красный'},
    {id:'orange', label:'Оранжевый', hex:'#ff7f00', extra:'Оранжевый'},
    {id:'purple', label:'Фиолетовый', hex:'#7d41c7', extra:'Фиолетовый'},
    {id:'silver', label:'Серебро', hex:'#bebebe', extra:'Серебро'},
    {id:'burgundy', label:'Бордовый', hex:'#9b0000', extra:'Бордовый'},
    {id:'yellow', label:'Жёлтый', hex:'#ffd400', extra:'Жёлтый'}
  ],
  thicknesses: [{id:'70', label:'70 мкм'}],
  qty: [100,200,300,500,1000,2000,3000,5000],
  prices: {
    s225340v:   {'white|70':4.7, 'black|70':4.6},
    s300400_30: {'white|70':6.7},
    s360450_30: {'white|70':8.45},
    s380500_30: {'white|70':9.75},
    s450500_30: {'white|70':11.4},
    s600500_30: {'white|70':15.6},
    s700500_30: {'white|70':18.7},
    s300400_40: {'white|80':9.4, 'black|70':7.15, 'darkblue|70':8.3, 'lightblue|70':8.1, 'blue|70':9, 'green|70':8.3, 'beige|70':7.55, 'red|70':8.15, 'orange|70':8.1, 'burgundy|70':8.2, 'yellow|70':7.4},
    s360450_40: {'transparent|70':9.7},
    s390500_40: {'white|80':14, 'white|100':17, 'black|70':9.38, 'darkblue|70':11.6, 'lightblue|70':11.6, 'blue|70':12, 'green|70':11.5, 'beige|70':9.9, 'red|70':11, 'orange|70':11.2, 'silver|70':11.5, 'burgundy|70':11.9, 'yellow|70':10.4},
  }
};

const money = v => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(v) + ' руб.';
const n0 = v => new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(v);

class Calc{
  constructor(root){
    this.root = root;
    this.state = {size:'s300400_40', color:'black', thickness:'70', qty:1000};
    this.ensureValidPair();
    this.render();
  }
  get size(){return CFG.sizes.find(x=>x.id===this.state.size)}
  get color(){return CFG.colors.find(x=>x.id===this.state.color)}
  key(color=this.state.color, thickness=this.state.thickness){return `${color}|${thickness}`}
  availableMap(){return CFG.prices[this.state.size] || {}}
  availableKeys(){return Object.keys(this.availableMap())}
  colorAvailable(colorId){
    return this.availableKeys().some(k => k === `${colorId}|70`);
  }
  pairAvailable(colorId=this.state.color, thickId=this.state.thickness){
    return Object.prototype.hasOwnProperty.call(this.availableMap(), `${colorId}|${thickId}`)
  }
  availableThicknessesForColor(colorId){
    return CFG.thicknesses.filter(t => this.pairAvailable(colorId, t.id));
  }
  ensureValidPair(){
    const first70 = this.availableKeys().find(k => k.endsWith('|70'));
    if (this.pairAvailable() && this.state.thickness === '70') return;
    if (first70){
      const [color, thickness] = first70.split('|');
      this.state.color = color;
      this.state.thickness = thickness;
      return;
    }
    const firstKey = this.availableKeys()[0];
    if (!firstKey) return;
    const [color, thickness] = firstKey.split('|');
    this.state.color = color;
    this.state.thickness = thickness;
  }
  calc(){
    const unit = this.availableMap()[this.key()] || 0;
    return {unit, total: unit * this.state.qty}
  }
  set(p){
    this.state = {...this.state, ...p};
    this.ensureValidPair();
    this.render();
  }
  buttons(items, active, block, label, disabledFn=null){
    return items.map(it => {
      const v = typeof it === 'object' ? it.id : it;
      const t = label ? label(it) : String(it);
      const disabled = disabledFn ? disabledFn(it) : false;
      return `<button type="button" class="btn ${v===active?'active':''}" data-block="${block}" data-value="${v}" ${disabled?'disabled':''}>${t}</button>`;
    }).join('');
  }
  render(){
    const c = this.calc();
    this.root.innerHTML = `
      <div class="panel">
        <div class="group">
          <h3>Размер пакета</h3>
          <div class="seg">${this.buttons(CFG.sizes, this.state.size, 'size', i=>i.label)}</div>
        </div>

        <div class="group">
          <h3>Цвет основы</h3>
          <div class="hint"></div>
          <div class="swatches">
            ${CFG.colors.map(i => `
              <button type="button"
                class="sw ${i.id==='white'?'white':''} ${i.transparent?'transparent':''} ${this.state.color===i.id?'active':''}"
                style="${i.transparent ? '' : `--sw:${i.hex}`}"
                data-block="color"
                data-value="${i.id}"
                title="${i.label}"
                aria-label="${i.label}"
                ${this.colorAvailable(i.id) ? '' : 'disabled'}></button>
            `).join('')}
          </div>
        </div>

        <div class="group">
          <h3>Тираж</h3>
          <div class="seg">${this.buttons(CFG.qty, this.state.qty, 'qty', i=>i+' шт.')}</div>
        </div>
        </div>

      <div class="sum">

        <div class="card">
          <div class="badges">
            <div class="badge">${this.size?.label || '—'}</div>
            <div class="badge">${this.color?.label || '—'}</div>
            <div class="badge">${n0(this.state.qty)} шт.</div>
          </div>
        </div>

        <div class="card">
          <h3>Расчёт стоимости</h3>
          <div class="row"><span>Цена за 1 шт.</span><strong>${money(c.unit)}</strong></div>
          <div class="row" style="margin-top:8px"><span>Количество</span><strong>${n0(this.state.qty)} шт.</strong></div>
          <div class="formula">${money(c.unit)} × ${n0(this.state.qty)} шт.</div>
        </div>

        <div class="card totalcard">
          <h3>Итоговая стоимость</h3>
          <div class="total">${money(c.total)}</div>
          <div class="actions">
            <button class="cta primary" type="button">Оставить заявку</button>
            <button class="cta secondary" type="button">Запросить точный расчёт</button>
          </div>
        </div>
      </div>`;
    this.root.querySelectorAll('[data-block]').forEach(el => {
      el.addEventListener('click', () => {
        const b = el.dataset.block;
        let v = el.dataset.value;
        if (b === 'qty') v = Number(v);
        this.set({[b]: v});
      });
    });
  }
}
new Calc(document.getElementById('packageCalculator'));
</script>
</body>
</html>
